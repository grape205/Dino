<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦕 翼龍加法大冒險</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:#0a0a1a;min-height:100vh;overflow-x:hidden;user-select:none}

/* sky bg */
.skybg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,#0a0a2e 0%,#1a1a4a 40%,#0d0d25 100%)}
.skybg::before{content:'';position:absolute;inset:0;background-image:
  radial-gradient(1.5px 1.5px at 8% 6%,rgba(255,255,220,.9),transparent),
  radial-gradient(1px 1px at 22% 3%,rgba(255,255,220,.7),transparent),
  radial-gradient(2px 2px at 45% 8%,rgba(255,255,220,.95),transparent),
  radial-gradient(1px 1px at 65% 2%,rgba(255,255,220,.6),transparent),
  radial-gradient(1.5px 1.5px at 80% 7%,rgba(255,255,220,.8),transparent),
  radial-gradient(1px 1px at 92% 12%,rgba(255,255,220,.7),transparent),
  radial-gradient(1px 1px at 35% 15%,rgba(255,255,220,.5),transparent),
  radial-gradient(1.5px 1.5px at 55% 4%,rgba(255,255,220,.8),transparent),
  radial-gradient(1px 1px at 12% 18%,rgba(255,255,220,.4),transparent)}
.skybg::after{content:'🌙';position:absolute;top:14px;right:20px;font-size:2rem;
  filter:drop-shadow(0 0 20px rgba(200,200,100,.8));animation:moonGlow 4s ease-in-out infinite}
@keyframes moonGlow{0%,100%{filter:drop-shadow(0 0 16px rgba(200,200,100,.6))}50%{filter:drop-shadow(0 0 36px rgba(200,200,100,1))}}

/* clouds */
.cloud{position:fixed;font-size:3rem;opacity:.12;animation:cloudDrift linear infinite;pointer-events:none;z-index:0}
@keyframes cloudDrift{from{transform:translateX(-15%)}to{transform:translateX(110%)}}

.wrap{max-width:480px;margin:0 auto;position:relative;z-index:1;padding-bottom:20px}

/* header */
.hdr{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo-dino{font-size:2.4rem;animation:ptero 3s ease-in-out infinite;
  filter:drop-shadow(0 4px 8px rgba(100,100,255,.4))}
@keyframes ptero{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.logo-t{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#a78bfa;
  text-shadow:0 2px 8px rgba(167,139,250,.4);line-height:1.15}
.logo-s{font-size:.6rem;color:#7c3aed;font-weight:800}

.star-pill{background:linear-gradient(135deg,#4c1d95,#7c3aed,#a78bfa);border-radius:50px;
  padding:7px 13px;display:flex;align-items:center;gap:5px;
  box-shadow:0 3px 14px rgba(124,58,237,.45),0 2px 0 rgba(40,0,120,.5)}
.sp-star{font-size:1.2rem;animation:sSpin 4s linear infinite}
@keyframes sSpin{to{transform:rotate(360deg)}}
.sp-n{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff;line-height:1}
.sp-l{font-size:.58rem;font-weight:800;color:rgba(255,255,255,.8)}

/* level selector */
.level-wrap{padding:0 12px 10px}
.level-title{font-family:'Fredoka One',cursive;font-size:.9rem;color:#a78bfa;margin-bottom:8px}
.level-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.lv-btn{padding:10px 4px;border:2px solid rgba(167,139,250,.25);border-radius:13px;
  background:rgba(0,0,0,.35);font-family:'Fredoka One',cursive;font-size:.78rem;
  color:#7c3aed;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  text-align:center;backdrop-filter:blur(4px)}
.lv-btn.unlocked{border-color:rgba(167,139,250,.5);color:#a78bfa}
.lv-btn.active{background:linear-gradient(135deg,#4c1d95,#7c3aed);
  border-color:#a78bfa;color:#fff;
  box-shadow:0 4px 16px rgba(124,58,237,.45),0 2px 0 rgba(40,0,100,.4);
  transform:translateY(-3px)}
.lv-btn.locked{opacity:.35;cursor:not-allowed}
.lv-btn .lv-range{font-size:.65rem;color:rgba(255,255,255,.7);display:block}

/* equation display */
.eq-box{background:rgba(0,0,0,.55);border:2.5px solid #7c3aed;border-radius:18px;
  padding:12px 16px;margin:0 12px 8px;backdrop-filter:blur(6px);
  box-shadow:0 0 24px rgba(124,58,237,.15)}
.eq-title{font-size:.62rem;font-weight:800;color:#a78bfa;margin-bottom:8px;letter-spacing:.5px}
.eq-vertical{
  font-family:'Fredoka One',cursive;
  display:inline-block;text-align:right;
  background:rgba(255,255,255,.04);border-radius:12px;padding:10px 18px 8px;
  border:1px solid rgba(167,139,250,.15);
  min-width:140px;
}
.eq-num{font-size:2.6rem;color:#fff;display:block;line-height:1.1}
.eq-op{font-size:2.6rem;color:#a78bfa;display:block;line-height:1.1}
.eq-line{border:none;border-top:3px solid #7c3aed;margin:4px 0 6px;display:block}
.eq-question{font-size:2.6rem;color:#ffb300;display:block;line-height:1.1;
  animation:qPulse .8s ease-in-out infinite}
@keyframes qPulse{0%,100%{opacity:1}50%{opacity:.5}}

/* stats */
.stats{display:flex;gap:7px;padding:0 12px 7px}
.sc{flex:1;background:rgba(0,0,0,.4);border:1.5px solid rgba(167,139,250,.2);
  border-radius:11px;padding:6px 4px;text-align:center;backdrop-filter:blur(4px)}
.sv{font-family:'Fredoka One',cursive;font-size:1.2rem;line-height:1}
.sv.g{color:#86efac}.sv.a{color:#fbbf24}.sv.r{color:#f87171}
.sl{font-size:.55rem;font-weight:800;color:#7c3aed;margin-top:1px}

/* arena */
.arena{position:relative;border-radius:17px;overflow:hidden;margin:0 12px;
  border:2.5px solid #4c1d95;
  box-shadow:0 0 40px rgba(124,58,237,.12),inset 0 0 80px rgba(0,0,0,.55)}
#gc{display:block;width:100%;touch-action:none}
.agnd{height:10px;background:linear-gradient(180deg,#4c1d95,#2e1065);border-top:2px solid #7c3aed}

/* overlays */
.gover{position:absolute;inset:0;background:rgba(0,0,0,.82);border-radius:15px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:30;backdrop-filter:blur(5px)}
.go-d{font-size:4.5rem;animation:ptero 1.5s ease-in-out infinite}
.go-t{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#a78bfa;text-align:center;
  text-shadow:2px 2px 0 rgba(80,0,200,.4)}
.go-s{font-family:'Fredoka One',cursive;font-size:.9rem;color:#c4b5fd;text-align:center;line-height:1.5}
.go-btn{padding:14px 32px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#4c1d95,#7c3aed);
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;cursor:pointer;
  box-shadow:0 5px 20px rgba(124,58,237,.5),0 3px 0 rgba(30,0,100,.5);transition:transform .15s}
.go-btn:hover{transform:scale(1.07)}.go-btn:active{transform:scale(.93)}

.lvbanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#4c1d95,#a78bfa);border-radius:17px;padding:11px 24px;
  font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff;
  box-shadow:0 8px 30px rgba(124,58,237,.55);display:none;z-index:20;pointer-events:none;
  animation:lvPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes lvPop{from{transform:translate(-50%,-50%) scale(0) rotate(-12deg)}to{transform:translate(-50%,-50%) scale(1)}}

.drag-hint{text-align:center;padding:5px 0 2px;font-family:'Fredoka One',cursive;
  font-size:.72rem;color:#7c3aed}

/* sound bar */
#soundBar2{display:flex;gap:0;margin:8px 12px 0;border-radius:14px;overflow:hidden;height:58px}
#soundBar2 button{flex:1;height:58px;border:none;
  font-family:'Fredoka One',cursive;font-size:.95rem;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  -webkit-tap-highlight-color:transparent}
#btnEq{background:linear-gradient(180deg,#4c1d95,#2e1065);border-right:2px solid rgba(0,0,0,.3)}
#btnEq:active{filter:brightness(1.4)}

/* confetti / toast */
.cfx{position:fixed;pointer-events:none;z-index:9999;font-size:1.4rem;animation:cfxFall 1.4s ease-out forwards}
@keyframes cfxFall{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),260px) scale(.3);opacity:0}}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#1e1b4b,#4c1d95);border:2px solid rgba(167,139,250,.35);
  color:#c4b5fd;padding:10px 20px;border-radius:50px;
  font-family:'Fredoka One',cursive;font-size:.88rem;
  box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:9999;
  transition:opacity .3s,transform .3s;white-space:nowrap}
.toast.hide{opacity:0;transform:translateX(-50%) translateY(14px);pointer-events:none}
</style>
</head>
<body>
<div class="skybg"></div>
<div class="cloud" style="top:12%;animation-duration:28s;animation-delay:0s">☁️</div>
<div class="cloud" style="top:25%;animation-duration:35s;animation-delay:-12s;font-size:2rem;opacity:.08">☁️</div>
<div class="cloud" style="top:8%;animation-duration:42s;animation-delay:-22s;font-size:4rem;opacity:.1">☁️</div>

<div class="wrap">
  <div class="hdr">
    <div class="logo">
      <span class="logo-dino">🦕</span>
      <div>
        <div class="logo-t">翼龍加法</div>
        <div class="logo-t">大冒險！</div>
        <div class="logo-s">Math Dino World 🌙</div>
      </div>
    </div>
    <div class="star-pill">
      <span class="sp-star">⭐</span>
      <div><div class="sp-l">星星</div><div class="sp-n" id="starNum">0</div></div>
    </div>
  </div>

  <!-- LEVEL SELECTOR -->
  <div class="level-wrap">
    <div class="level-title">⚡ 選擇等級</div>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <!-- EQUATION DISPLAY -->
  <div class="eq-box">
    <div class="eq-title">👆 接住正確的答案！</div>
    <div style="display:flex;align-items:flex-end;gap:20px">
      <div class="eq-vertical">
        <span class="eq-num" id="eqA">4</span>
        <span class="eq-op">+ <span id="eqB">3</span></span>
        <hr class="eq-line">
        <span class="eq-question">?</span>
      </div>
      <div style="font-family:'Fredoka One',cursive;color:#a78bfa;font-size:.85rem;line-height:1.4">
        <span id="eqA2" style="font-size:1.8rem;color:#fff">4</span><br>
        加<br>
        <span id="eqB2" style="font-size:1.8rem;color:#fff">3</span><br>
        等於？
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="sc"><div class="sv g" id="sScore">0</div><div class="sl">✅ 得分</div></div>
    <div class="sc"><div class="sv a" id="sLevel">1</div><div class="sl">⚡ 等級</div></div>
    <div class="sc"><div class="sv r" id="sLives">❤️❤️❤️</div><div class="sl">生命</div></div>
    <div class="sc"><div class="sv" style="color:#86efac;font-size:.9rem" id="streak">🔥 0</div><div class="sl">連答</div></div>
  </div>

  <!-- ARENA -->
  <div class="arena">
    <canvas id="gc"></canvas>
    <div class="agnd"></div>
    <div class="lvbanner" id="lvBanner">⚡ 升級！</div>
    <div class="gover" id="gOver">
      <div class="go-d">🦕</div>
      <div class="go-t">翼龍加法<br>大冒險！</div>
      <div class="go-s" id="gMsg">接住正確的答案！<br>接錯了要扣血哦 🌙</div>
      <button class="go-btn" onclick="startGame()">🎮 開始！</button>
    </div>
  </div>
  <div class="drag-hint">👈 左右滑動翼龍接答案 👉</div>

  <!-- SOUND BTN -->
  <div id="soundBar2">
    <button id="btnEq" onclick="readEquation()">
      🔊 念算式
    </button>
  </div>
</div>

<div class="toast hide" id="toast"></div>

let stars    = parseInt(localStorage.getItem('pteroStars')||'0');
let totalScore = parseInt(localStorage.getItem('pteroScore')||'0');

function saveData(){
  localStorage.setItem('pteroStars', stars);

}

// ══ AUDIO ══
let _ac = null;
function AC(){
  if(!_ac) _ac = new(window.AudioContext||window.webkitAudioContext)();
  return _ac;
}
function unlockAudio(){ try{ AC().resume(); }catch(e){} }

function playNote(f,d,type,v,delay){
  type=type||'sine';v=v||.18;delay=delay||0;
  try{
    const a=AC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.setValueAtTime(f,a.currentTime+delay);
    g.gain.setValueAtTime(0,a.currentTime+delay);
    g.gain.linearRampToValueAtTime(v,a.currentTime+delay+.01);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+delay+d);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+d+.05);
  }catch(e){}
}

function sndCorrect(){
  playNote(523,.10,'sine',.22,0);playNote(659,.10,'sine',.20,.10);
  playNote(784,.15,'sine',.20,.20);playNote(1047,.28,'sine',.16,.30);
}

let _bgmCtx=null,_bgmDecoded=null,_bgmSrc=null,_bgmPlaying=false;

function _b64buf(b){
  const bin=atob(b),buf=new ArrayBuffer(bin.length),arr=new Uint8Array(buf);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return buf;
}

function startBGM(){
  if(_bgmPlaying)return;
  _bgmPlaying=true;
  _bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
  _bgmCtx.resume().then(()=>{
    if(_bgmDecoded){_bgmLoop();return;}
    _bgmCtx.decodeAudioData(_b64buf(BGM_B64),
      buf=>{_bgmDecoded=buf;_bgmLoop();},
      e=>console.log('BGM err',e));
  });
}

function _bgmLoop(){
  if(!_bgmPlaying||!_bgmCtx||!_bgmDecoded)return;
  _bgmSrc=_bgmCtx.createBufferSource();
  _bgmSrc.buffer=_bgmDecoded;
  _bgmSrc.connect(_bgmCtx.destination);
  _bgmSrc.onended=()=>{if(_bgmPlaying)_bgmLoop();};
  _bgmSrc.start(0);
}

function stopBGM(){
  _bgmPlaying=false;
  if(_bgmSrc){try{_bgmSrc.stop();}catch(e){} _bgmSrc=null;}
  if(_bgmCtx){try{_bgmCtx.close();}catch(e){} _bgmCtx=null;}
  _bgmDecoded=null;
}

// Read equation aloud using Web Audio tones (same device constraint)
function readEquation(){
  unlockAudio();
  // Play tones representing the numbers
  const a=AC(), now=a.currentTime;
  // A tone, pause, B tone, pause, answer tone
  playNote(440+eqA*20, .3,'sine',.2, 0);
  playNote(300,.15,'sine',.1, .4);  // "plus" sound
  playNote(440+eqB*20, .3,'sine',.2, .6);
  playNote(300,.15,'sine',.1, 1.0);  // "equals" sound
  playNote(440+eqAns*20,.4,'sine',.22, 1.2); // answer
}

// ══ CANVAS ══
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const DW=70,DH=60;
function resize(){
  const w=canvas.parentElement.clientWidth;
  canvas.width=w; canvas.height=Math.min(380,Math.round(w*.85));
}
resize();
window.addEventListener('resize',()=>{resize();if(!gameActive)idleDraw();});

// ══ GAME STATE ══
let gameActive=false,gameRaf=null,idleRafId=null;
let score=0,lives=3,gameLevel=1,frame=0,spawnInt=90,fallSpd=1.4,streakCount=0;
let dinoX=0,prevDX=0;
let mouthA=0,mouthDir=1,chomping=false,chompT=0;
let letters=[],parts=[];

function resetGame(){
  score=0;lives=3;gameLevel=1;frame=0;spawnInt=90;fallSpd=1.4;streakCount=0;
  dinoX=canvas.width/2;prevDX=dinoX;
  mouthA=0;mouthDir=1;chomping=false;chompT=0;
  letters=[];parts=[];
  newEquation();
}

function newEquation(){
  const lv = LEVELS.find(l=>l.id===curLvId)||LEVELS[0];
  const half = Math.floor(lv.max/2);
  eqA = 1+Math.floor(Math.random()*half);
  eqB = 1+Math.floor(Math.random()*(lv.max-eqA));
  eqAns = eqA+eqB;
  updateEqDisplay();
}

function updateEqDisplay(){
  document.getElementById('eqA').textContent=eqA;
  document.getElementById('eqB').textContent=eqB;
  document.getElementById('eqA2').textContent=eqA;
  document.getElementById('eqB2').textContent=eqB;
}

// ══ INPUT ══
let drag=false,dragSX=0,dragDX=0;
canvas.addEventListener('touchstart',e=>{
  drag=true;dragSX=e.touches[0].clientX;dragDX=dinoX;
  unlockAudio();e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!drag)return;
  const r=canvas.getBoundingClientRect(),sc=canvas.width/r.width;
  dinoX=Math.max(DW/2+4,Math.min(canvas.width-DW/2-4,dragDX+(e.touches[0].clientX-dragSX)*sc));
  e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',()=>drag=false);
canvas.addEventListener('mousedown',e=>{drag=true;dragSX=e.clientX;dragDX=dinoX;unlockAudio();});
canvas.addEventListener('mousemove',e=>{
  if(!drag)return;
  const r=canvas.getBoundingClientRect(),sc=canvas.width/r.width;
  dinoX=Math.max(DW/2+4,Math.min(canvas.width-DW/2-4,dragDX+(e.clientX-dragSX)*sc));});
document.addEventListener('mouseup',()=>drag=false);

// ══ IDLE ══
function stopIdle(){if(idleRafId){cancelAnimationFrame(idleRafId);idleRafId=null;}}
function startIdle(){
  stopIdle();
  function tick(){
    if(gameActive){idleRafId=null;return;}
    idleRafId=requestAnimationFrame(tick);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBG();
    const m=.12+Math.sin(Date.now()/500)*.1;
    drawDino(canvas.width/2,canvas.height-DH-3,m);
  }
  tick();
}
function idleDraw(){ctx.clearRect(0,0,canvas.width,canvas.height);drawBG();drawDino(canvas.width/2,canvas.height-DH-3,0);}

// ══ START ══
function startGame(){
  stopIdle();
  if(gameRaf){cancelAnimationFrame(gameRaf);gameRaf=null;}
  resetGame();
  gameActive=true;
  document.getElementById('gOver').style.display='none';
  updateHUD();
  startBGM();
  gameLoop();
}

function updateHUD(){
  document.getElementById('sScore').textContent=score;
  document.getElementById('sLevel').textContent=gameLevel;
  document.getElementById('sLives').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('streak').textContent='🔥 '+streakCount;
}

// ══ GAME LOOP ══
function gameLoop(){
  if(!gameActive){gameRaf=null;startIdle();return;}
  if(letters.length>15)letters.splice(0,letters.length-8);
  gameRaf=requestAnimationFrame(gameLoop);
  frame++;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBG();

  const vx=dinoX-prevDX; prevDX=dinoX;

  // mouth
  if(chomping){
    chompT++;
    mouthA=chompT<=6?chompT/6:Math.max(0,1-(chompT-6)/5);
    if(chompT>13){chomping=false;chompT=0;mouthA=0;}
  } else {
    const spd=Math.abs(vx);
    if(spd>.4){
      const ms=.06+Math.min(spd*.06,.22);
      mouthA+=mouthDir*ms;
      if(mouthA>=1){mouthA=1;mouthDir=-1;}
      else if(mouthA<=0){mouthA=0;mouthDir=1;}
    } else { mouthA=Math.max(0,mouthA-.06); }
  }

  if(frame%spawnInt===0) spawnNumber();

  const dinoTopY=canvas.height-DH-3;
  const mTipX=dinoX+DW*.30;
  const mTipY=dinoTopY+DH*.30+mouthA*DH*.12;

  for(let i=letters.length-1;i>=0;i--){
    const f=letters[i];
    f.y+=f.spd;
    f.wobble+=f.wSpd;
    const fx=f.x+Math.sin(f.wobble)*8;

    if(Math.hypot(fx-mTipX,f.y-mTipY)<f.r+14 && mouthA>.18){
      if(f.isAns){
        score++;totalScore++;stars+=3;streakCount++;saveData();updateStarUI();
        sndCorrect();chomping=true;chompT=0;sndChomp();
        burst(fx,f.y,true);
        letters.splice(0); // clear screen
        newEquation();
        updateHUD();
        if(streakCount%5===0) doLevelUp();
      } else {
        sndWrong();burst(fx,f.y,false);shakeIt();
        streakCount=0;letters.splice(i,1);
        lives--;updateHUD();
        if(lives<=0){doEndGame();return;}
      }
      continue;
    }
    if(f.y-f.r>canvas.height){
      if(f.isAns){
        lives--;streakCount=0;updateHUD();
        if(lives<=0){doEndGame();return;}
      }
      letters.splice(i,1);continue;
    }
    drawNumber(f,fx);
  }

  drawParts();
  drawDino(dinoX,dinoTopY,mouthA);
}

// ══ SPAWN ══
function spawnNumber(){
  const lv=LEVELS.find(l=>l.id===curLvId)||LEVELS[0];
  // Always include correct answer + 3-4 wrong answers
  const wrongs=[];
  while(wrongs.length<4){
    const w=1+Math.floor(Math.random()*(lv.max*2));
    if(w!==eqAns && !wrongs.includes(w)) wrongs.push(w);
  }
  const pool=[eqAns,eqAns,...wrongs]; // answer appears more often
  const num=pool[Math.floor(Math.random()*pool.length)];
  const COLS=['#f87171','#7bc8f0','#c084fc','#fb923c','#34d399','#f472b6'];
  letters.push({
    x:40+Math.random()*(canvas.width-80),y:-30,
    num, isAns:num===eqAns,
    spd:fallSpd+Math.random()*.7,
    wobble:Math.random()*Math.PI*2,wSpd:.025+Math.random()*.025,
    r:26,color:num===eqAns?'#fbbf24':COLS[Math.floor(Math.random()*COLS.length)],
  });
}

// ══ DRAW BG ══
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#0a0a2e');g.addColorStop(1,'#1a1a4a');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  // stars
  ctx.fillStyle='rgba(255,255,220,.6)';
  [[.15,.1],[.45,.05],[.72,.12],[.88,.08],[.33,.18],[.6,.03]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(x*canvas.width,y*canvas.height,1,0,Math.PI*2);ctx.fill();
  });
}

// ══ DRAW NUMBER BUBBLE ══
function drawNumber(f,fx){
  ctx.save();
  ctx.translate(fx,f.y);
  ctx.shadowColor=f.color;ctx.shadowBlur=22;
  ctx.beginPath();ctx.arc(0,0,f.r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fill();
  ctx.strokeStyle=f.color;ctx.lineWidth=2.5;ctx.stroke();
  ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(-7,-8,7,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fill();
  ctx.fillStyle=f.color;
  const sz = f.num>=100?f.r*.75:f.r*.95;
  ctx.font=`bold ${sz}px 'Fredoka One',cursive`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(f.num,0,2);
  ctx.restore();
}

// ══ DRAW PTERODACTYL ══
function drawDino(cx,cy,mA){
  mA=mA||0;
  ctx.save();
  ctx.translate(cx,cy);

  // shadow
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath();ctx.ellipse(0,DH,22,5,0,0,Math.PI*2);ctx.fill();

  // WINGS (spread out) — main feature of pterodactyl
  // Left wing
  ctx.fillStyle='#7c3aed';
  ctx.shadowColor='#a78bfa';ctx.shadowBlur=8;
  ctx.beginPath();
  ctx.moveTo(-DW*.1,DH*.3);
  ctx.bezierCurveTo(-DW*.7,DH*.0,-DW*.9,-DH*.1,-DW*.7,DH*.2);
  ctx.bezierCurveTo(-DW*.5,DH*.35,-DW*.2,DH*.45,-DW*.05,DH*.4);
  ctx.closePath();ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(DW*.1,DH*.3);
  ctx.bezierCurveTo(DW*.7,DH*.0,DW*.9,-DH*.1,DW*.7,DH*.2);
  ctx.bezierCurveTo(DW*.5,DH*.35,DW*.2,DH*.45,DW*.05,DH*.4);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;

  // Wing membrane detail
  ctx.strokeStyle='rgba(167,139,250,.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-DW*.1,DH*.35);ctx.lineTo(-DW*.7,DH*.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-DW*.1,DH*.38);ctx.lineTo(-DW*.55,DH*.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(DW*.1,DH*.35);ctx.lineTo(DW*.7,DH*.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(DW*.1,DH*.38);ctx.lineTo(DW*.55,DH*.2);ctx.stroke();

  // Body
  ctx.fillStyle='#6d28d9';
  ctx.shadowColor='#a78bfa';ctx.shadowBlur=10;
  ctx.beginPath();ctx.ellipse(0,DH*.5,DW*.18,DH*.35,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Crest on head
  ctx.fillStyle='#a78bfa';
  ctx.beginPath();
  ctx.moveTo(DW*.15,DH*.15);
  ctx.lineTo(DW*.4,-DH*.15);
  ctx.lineTo(DW*.25,DH*.18);
  ctx.closePath();ctx.fill();

  // Head
  ctx.fillStyle='#7c3aed';
  ctx.shadowColor='#a78bfa';ctx.shadowBlur=6;
  ctx.beginPath();ctx.ellipse(DW*.2,DH*.2,DW*.2,DH*.18,-.1,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Beak - animated
  const jawDrop=mA*DH*.18;
  // Upper beak
  ctx.fillStyle='#c4b5fd';
  ctx.beginPath();
  ctx.moveTo(DW*.05,DH*.18);ctx.lineTo(DW*.45,DH*.14);ctx.lineTo(DW*.05,DH*.22);
  ctx.closePath();ctx.fill();
  // Lower beak (moves)
  ctx.save();
  ctx.translate(DW*.08,DH*.24);ctx.rotate(mA*.4);
  ctx.fillStyle='#a78bfa';
  ctx.beginPath();
  ctx.moveTo(-DW*.03,0);ctx.lineTo(DW*.37,jawDrop*.8);ctx.lineTo(-DW*.03,jawDrop*.15);
  ctx.closePath();ctx.fill();
  if(mA>.1){
    ctx.fillStyle=`rgba(220,38,38,${mA*.8})`;
    ctx.beginPath();ctx.ellipse(DW*.12,jawDrop*.4,DW*.08,jawDrop*.12,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Eye
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,.8)';ctx.shadowBlur=4;
  ctx.beginPath();ctx.arc(DW*.24,DH*.14,DH*.068,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(DW*.26,DH*.145,DH*.038,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(DW*.27,DH*.133,DH*.013,0,Math.PI*2);ctx.fill();

  // Feet
  ctx.fillStyle='#6d28d9';
  ctx.beginPath();ctx.roundRect?ctx.roundRect(-DW*.08,DH*.82,DW*.08,DH*.2,3):ctx.rect(-DW*.08,DH*.82,DW*.08,DH*.2);ctx.fill();
  ctx.beginPath();ctx.roundRect?ctx.roundRect(DW*.02,DH*.82,DW*.08,DH*.2,3):ctx.rect(DW*.02,DH*.82,DW*.08,DH*.2);ctx.fill();
  ctx.fillStyle='#4c1d95';
  ctx.beginPath();ctx.ellipse(-DW*.04,DH*1.01,DW*.08,DH*.035,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(DW*.06,DH*1.01,DW*.08,DH*.035,0,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

// ══ PARTICLES ══
function burst(x,y,ok){
  const em=ok?['⭐','✨','💫','🎉','🦕']:['💥','❌','😵'];
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4.5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,alpha:1,sc:1,
      em:em[Math.floor(Math.random()*em.length)]});
  }
}
function drawParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.alpha-=.03;p.sc*=.97;
    if(p.alpha<=0){parts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.scale(p.sc,p.sc);
    ctx.font='1.1rem serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.em,0,0);ctx.restore();
  }
}

// ══ LEVEL UP ══
function doLevelUp(){
  gameLevel++;fallSpd=Math.min(5.5,1.4+gameLevel*.35);spawnInt=Math.max(35,90-gameLevel*6);
  const b=document.getElementById('lvBanner');
  b.textContent='⚡ LEVEL '+gameLevel+'！';b.style.display='block';
  clearTimeout(b._t);b._t=setTimeout(()=>b.style.display='none',1800);
}

// ══ SHAKE ══
let shaking=false;
function shakeIt(){
  if(shaking)return;shaking=true;
  const el=canvas.parentElement;
  ['-8px','8px','-5px','5px',''].forEach((v,i)=>
    setTimeout(()=>{el.style.transform=v?`translateX(${v})`:'';if(i===4)shaking=false;},i*55));
}

// ══ END ══
function doEndGame(){
  gameActive=false;cancelAnimationFrame(gameRaf);gameRaf=null;
  stopBGM();
  stars+=score*3;totalScore+=score;saveData();updateStarUI();
  confetti();
  const ov=document.getElementById('gOver');
  ov.style.display='flex';
  document.getElementById('gMsg').innerHTML=
    `得了 <span style="color:#fbbf24;font-size:1.4em">${score}</span> 分！<br>`+
    `獲得 <span style="color:#fbbf24">${score*3}</span> 顆⭐`;
  ov.querySelector('.go-btn').textContent='🔄 再玩一次！';
  showToast(`🎮 結束！得${score}分 +${score*3}⭐`);
}

// ══ LEVELS UI ══
function renderLevels(){
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  LEVELS.forEach(lv=>{
    const unlocked = totalScore >= lv.need;
    const btn=document.createElement('button');
    btn.className='lv-btn'+(curLvId===lv.id?' active':'')+(unlocked?' unlocked':' locked');
    btn.innerHTML=`${lv.label}<span class="lv-range">${unlocked?'✅':'🔒 '+lv.need+'分'}</span>`;
    btn.onclick=()=>{
      if(!unlocked){showToast(`🔒 需要 ${lv.need} 總分才能解鎖！現在有 ${totalScore} 分`);return;}
      curLvId=lv.id;renderLevels();newEquation();showToast(`⚡ 切換到 ${lv.label}！`);
    };
    grid.appendChild(btn);
  });
}

// ══ UTILS ══
function updateStarUI(){document.getElementById('starNum').textContent=stars;}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('hide');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('hide'),2600);
}
function confetti(){
  const items=['🌟','⭐','✨','🎉','💫','🦕','💜','🎊'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');el.className='cfx';
    el.textContent=items[Math.floor(Math.random()*items.length)];
    el.style.cssText=`left:${16+Math.random()*68}%;top:${3+Math.random()*18}%;--dx:${(Math.random()-.5)*160}px;animation-delay:${Math.random()*.4}s;animation-duration:${.9+Math.random()*.7}s`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
  }
}

// ══ INIT ══
updateStarUI();
renderLevels();
newEquation();
resize();
startIdle();
</script>
