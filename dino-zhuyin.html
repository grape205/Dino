<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦕 恐龍注音大冒險</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@700;900&display=swap');
:root{--g1:#4CAF50;--g2:#2E7D32;--g3:#A5D6A7;--g4:#E8F5E9;--sun:#FFD600;--orange:#FF9800;--red:#FF1744;--blue:#42A5F5;--purple:#AB47BC;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fredoka One','Noto Sans TC',sans-serif;background:#1B5E20;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.jungle-bg{position:fixed;inset:0;background:linear-gradient(180deg,#1a3a0a 0%,#2d5a1b 35%,#4a8f30 100%);z-index:0;}
.jungle-floor{position:fixed;bottom:0;left:0;right:0;height:110px;background:linear-gradient(#5D4037,#4E342E);border-radius:60% 60% 0 0/30px 30px 0 0;z-index:1;}
.leaf-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.leaf{position:absolute;font-size:3rem;animation:sway 3s ease-in-out infinite alternate;user-select:none;}
.leaf:nth-child(1){top:0;left:-15px;font-size:5rem;}
.leaf:nth-child(2){top:15px;right:-10px;font-size:4rem;animation-delay:.5s;}
.leaf:nth-child(3){top:55px;left:5px;font-size:3.5rem;animation-delay:1s;}
.leaf:nth-child(4){top:35px;right:15px;font-size:3rem;animation-delay:1.5s;}
.leaf:nth-child(5){bottom:100px;left:-10px;font-size:4.5rem;animation-delay:.3s;}
.leaf:nth-child(6){bottom:75px;right:-5px;font-size:3.5rem;animation-delay:.8s;}
@keyframes sway{from{transform:rotate(-8deg)}to{transform:rotate(8deg) translateY(-10px)}}
.falling-leaf{position:fixed;top:-50px;animation:fall linear infinite;opacity:.6;pointer-events:none;z-index:1;font-size:1.5rem;}
@keyframes fall{0%{transform:translateY(0) rotate(0) translateX(0);opacity:.6}50%{transform:translateY(50vh) rotate(180deg) translateX(30px)}100%{transform:translateY(110vh) rotate(360deg) translateX(-20px);opacity:0}}
.bg-dino{position:fixed;bottom:108px;font-size:2.5rem;animation:walk 12s linear infinite;opacity:.35;z-index:1;pointer-events:none;}
.bg-dino:nth-child(2){animation-delay:5s;font-size:1.8rem;}
.bg-dino:nth-child(3){animation-delay:9s;font-size:3rem;}
@keyframes walk{from{transform:translateX(-150px)}to{transform:translateX(calc(100vw + 150px))}}

/* Card */
.game-card{position:relative;z-index:10;background:linear-gradient(145deg,#FFFDE7,#F9FBE7);border-radius:32px;width:min(450px,94vw);padding:20px 18px 24px;box-shadow:0 8px 0 #2E7D32,0 14px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.8);border:4px solid var(--g1);animation:cardPop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes cardPop{from{transform:scale(.7) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#2E7D32,#4CAF50);border-radius:20px;padding:10px 14px;box-shadow:0 4px 0 #1B5E20;margin-bottom:12px;}
.dino-mascot{font-size:2rem;animation:dinoHead 2s ease-in-out infinite;display:inline-block;}
@keyframes dinoHead{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg) translateY(-3px)}}
.title{color:#fff;font-size:1.2rem;text-shadow:2px 2px 0 #1B5E20;}
.score-area{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.score-badge{background:#FFD600;color:#333;border-radius:20px;padding:3px 12px;font-size:.95rem;font-weight:900;box-shadow:0 3px 0 #F9A825;}
.lives{font-size:1.1rem;letter-spacing:2px;}

/* Level badge */
.level-badge{text-align:center;margin-bottom:10px;background:linear-gradient(135deg,#FF9800,#FF6F00);color:#fff;border-radius:14px;padding:5px 14px;font-size:.95rem;box-shadow:0 3px 0 #E65100;transition:background .5s;}
.level-badge.lv2{background:linear-gradient(135deg,#AB47BC,#7B1FA2);box-shadow:0 3px 0 #6A1B9A;}
.level-badge.lv3{background:linear-gradient(135deg,#FF1744,#B71C1C);box-shadow:0 3px 0 #7F0000;}

/* Progress */
.progress-wrap{background:#C8E6C9;border-radius:20px;height:14px;margin-bottom:12px;overflow:hidden;border:2px solid #81C784;position:relative;}
.progress-bar{height:100%;background:linear-gradient(90deg,#FFD600,#FF9800);border-radius:20px;transition:width .5s cubic-bezier(.34,1.56,.64,1);position:relative;}
.progress-bar::after{content:'🦕';position:absolute;right:-12px;top:50%;transform:translateY(-50%);font-size:1.4rem;}

/* Timer */
.timer-wrap{background:#FFCDD2;border-radius:20px;height:10px;margin-bottom:10px;overflow:hidden;border:2px solid #EF9A9A;display:none;}
.timer-wrap.show{display:block;}
.timer-bar{height:100%;background:linear-gradient(90deg,#FF5252,#FF1744);border-radius:20px;transition:width .1s linear;}

/* Question label */
.question-label{text-align:center;color:#5D4037;font-size:.95rem;margin-bottom:10px;background:#FFF3E0;border-radius:12px;padding:5px 12px;border:2px dashed #FFCC02;}

/* Emoji box */
.emoji-box{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border-radius:24px;padding:16px;margin-bottom:14px;border:3px solid #A5D6A7;box-shadow:0 4px 0 #81C784,inset 0 2px 8px rgba(255,255,255,.8);min-height:120px;position:relative;overflow:hidden;}
.emoji-box::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.5) 0%,transparent 60%);}
.big-emoji{font-size:3.8rem;line-height:1;filter:drop-shadow(3px 4px 6px rgba(0,0,0,.2));animation:emojiFloat 2s ease-in-out infinite;position:relative;z-index:1;}
@keyframes emojiFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.item-name{font-size:1.4rem;color:#2E7D32;margin-top:6px;position:relative;z-index:1;}
.hint-text{font-size:.85rem;color:#888;margin-top:3px;position:relative;z-index:1;}

/* Answers */
.answers{display:grid;gap:10px;margin-bottom:12px;}
.answers.cols2{grid-template-columns:1fr 1fr;}
.answers.cols4{grid-template-columns:1fr 1fr 1fr 1fr;}
.answer-btn{background:linear-gradient(145deg,#fff,#f5f5f5);border:3px solid #A5D6A7;border-radius:16px;padding:12px 6px;font-family:inherit;font-size:1.7rem;cursor:pointer;text-align:center;transition:transform .15s,box-shadow .15s,background .2s;box-shadow:0 5px 0 #81C784;color:#2E7D32;position:relative;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;line-height:1.2;}
.answer-btn.small{font-size:1.15rem;padding:10px 4px;}
.answer-btn.tone-btn{font-size:2rem;padding:14px 6px;}
.answer-btn:hover{transform:translateY(-3px);box-shadow:0 8px 0 #4CAF50;background:linear-gradient(145deg,#F1F8E9,#E8F5E9);}
.answer-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #81C784;}
.answer-btn.correct{background:linear-gradient(145deg,#E8F5E9,#C8E6C9);border-color:#00C853;box-shadow:0 5px 0 #00C853;animation:correctBounce .4s cubic-bezier(.34,1.56,.64,1);color:#1B5E20;}
.answer-btn.wrong{background:linear-gradient(145deg,#FFEBEE,#FFCDD2);border-color:#FF1744;box-shadow:0 5px 0 #FF1744;animation:shake .4s ease;color:#B71C1C;}
.answer-btn.disabled{pointer-events:none;opacity:.7;}
.fi{position:absolute;top:3px;right:6px;font-size:.9rem;opacity:0;}
.answer-btn.correct .fi,.answer-btn.wrong .fi{opacity:1;}
@keyframes correctBounce{0%{transform:scale(1)}40%{transform:scale(1.15) rotate(-3deg)}70%{transform:scale(.95) rotate(2deg)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px) rotate(-2deg)}40%{transform:translateX(8px) rotate(2deg)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

.feedback-msg{text-align:center;font-size:1.2rem;min-height:30px;padding:2px;}

/* Particles */
.particle{position:fixed;pointer-events:none;z-index:100;animation:pFly .8s ease-out forwards;font-size:1.4rem;}
@keyframes pFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

/* End screen */
.end-screen{display:none;flex-direction:column;align-items:center;gap:14px;padding:8px 0;animation:cardPop .5s cubic-bezier(.34,1.56,.64,1) both;}
.end-screen.show{display:flex;}
.end-dino{font-size:5.5rem;animation:dinoVictory 1s ease-in-out infinite alternate;filter:drop-shadow(4px 6px 10px rgba(0,0,0,.3));}
@keyframes dinoVictory{from{transform:scale(1) rotate(-5deg)}to{transform:scale(1.1) rotate(5deg) translateY(-10px)}}
.end-title{font-size:2rem;color:#2E7D32;text-shadow:3px 3px 0 #A5D6A7;text-align:center;}
.end-score-display{background:linear-gradient(135deg,#FFD600,#FF9800);color:#fff;border-radius:24px;padding:12px 28px;font-size:1.8rem;box-shadow:0 6px 0 #E65100;text-shadow:2px 2px 0 rgba(0,0,0,.2);}
.stars-row{font-size:2.2rem;letter-spacing:6px;animation:starsAppear .5s ease both;}
@keyframes starsAppear{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.end-stats{background:#E8F5E9;border-radius:16px;padding:10px 20px;font-size:.95rem;color:#2E7D32;text-align:center;line-height:1.8;border:2px solid #A5D6A7;}
.play-again-btn{background:linear-gradient(145deg,#4CAF50,#2E7D32);color:#fff;border:none;border-radius:24px;padding:14px 36px;font-family:inherit;font-size:1.4rem;cursor:pointer;box-shadow:0 6px 0 #1B5E20;transition:transform .15s,box-shadow .15s;}
.play-again-btn:hover{transform:translateY(-3px);box-shadow:0 9px 0 #1B5E20;}
.play-again-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #1B5E20;}

/* Level up popup */
.level-popup{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);}
.level-popup.hide{display:none;}
.level-popup-inner{background:linear-gradient(145deg,#fff,#F9FBE7);border-radius:28px;padding:26px 32px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.4);border:4px solid #FFD600;animation:cardPop .4s cubic-bezier(.34,1.56,.64,1) both;max-width:320px;}
.pop-dino{font-size:4rem;animation:dinoVictory .8s ease-in-out infinite alternate;}
.pop-title{font-size:1.7rem;color:#E65100;margin:8px 0 4px;text-shadow:2px 2px 0 #FFE082;}
.pop-desc{font-size:1rem;color:#555;margin-bottom:16px;line-height:1.6;}
.pop-btn{background:linear-gradient(145deg,#FF9800,#E65100);color:#fff;border:none;border-radius:20px;padding:12px 28px;font-family:inherit;font-size:1.2rem;cursor:pointer;box-shadow:0 5px 0 #BF360C;}

.intro-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1a3a1a,#0a1f0a);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.intro-dino{font-size:5rem;animation:bounce 1.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.intro-title{font-size:2rem;color:#fff;margin:16px 0 8px}
.intro-sub{font-size:.95rem;color:#81c784;margin-bottom:30px;line-height:1.6}
.intro-btn{background:linear-gradient(135deg,#4caf50,#2e7d32);border:none;border-radius:99px;padding:16px 40px;color:#fff;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;box-shadow:0 6px 20px rgba(76,175,80,.4)}
</style>
</head>
<body>
<div class="jungle-bg"></div>
<div class="jungle-floor"></div>
<div class="leaf-layer">
  <span class="leaf">🌿</span><span class="leaf">🍃</span><span class="leaf">🌱</span>
  <span class="leaf">🍀</span><span class="leaf">🌿</span><span class="leaf">🍃</span>
  <span class="falling-leaf" style="left:10%;animation-duration:8s;animation-delay:0s">🍃</span>

</div>
<span class="bg-dino">🦖</span><span class="bg-dino">🦕</span><span class="bg-dino">🦖</span>

<!-- Level-up popup -->
<div class="level-popup hide" id="levelPopup">
  <div class="level-popup-inner">
    <div class="pop-dino" id="popDino">🦕</div>
    <div class="pop-title" id="popTitle">難度升級！</div>
    <div class="pop-desc" id="popDesc"></div>
    <button class="pop-btn" onclick="closeLevelPopup()">繼續冒險 🦖</button>
  </div>
</div>

<!-- Game card -->
<div class="game-card">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="dino-mascot">🦕</span>
      <span class="title">恐龍注音大冒險</span>
    </div>
    <div class="score-area">
      <div class="score-badge">⭐ <span id="scoreNum">0</span> 分</div>
      <div class="lives" id="livesDisplay">❤️❤️❤️</div>
    </div>
  </div>

  <div class="level-badge" id="levelBadge">🥚 第一關・恐龍蛋</div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="timer-wrap" id="timerWrap">
    <div class="timer-bar" id="timerBar" style="width:100%"></div>
  </div>

  <div id="questionArea">
    <div class="question-label" id="questionLabel">👀 這個是什麼注音？</div>
    <div class="emoji-box">
      <div class="big-emoji" id="bigEmoji">🥚</div>
      <div class="item-name" id="itemName">？</div>
      <div class="hint-text" id="hintText"></div>
    </div>
    <div class="answers cols2" id="answersGrid"></div>
    <div class="feedback-msg" id="feedbackMsg"></div>
  </div>

  <div class="end-screen" id="endScreen">
    <div class="end-dino" id="endDino">🦕</div>
    <div class="end-title" id="endTitle">太厲害了！</div>
    <div class="stars-row" id="starsRow">⭐⭐⭐</div>
    <div class="end-score-display">得了 <span id="finalScore">0</span> 分！</div>
    <div class="end-stats" id="endStats"></div>
    <button class="play-again-btn" onclick="startGame()">🦖 再玩一次！</button>
  </div>
</div>

  {emoji:'🍕',name:'披薩',zhuyin:'ㄆㄧ',initial:'ㄆ',syllable:'ㄆㄧ',tone:'ˉ',toneWord:'ㄆㄧ',wrongI:['ㄅ','ㄇ','ㄈ','ㄉ','ㄊ'],wrongS:['ㄅㄧ','ㄇㄧ','ㄆㄨ','ㄆㄟ'],wrongT:['ˊ','ˇ','ˋ']},
  {emoji:'🐼',name:'熊貓',zhuyin:'ㄒㄩㄥˊ',initial:'ㄒ',syllable:'ㄒㄩㄥˊ',tone:'ˊ',toneWord:'ㄒㄩㄥ',wrongI:['ㄐ','ㄑ','ㄓ','ㄔ','ㄕ'],wrongS:['ㄐㄩㄥˊ','ㄑㄩㄥˊ','ㄒㄧㄥˊ','ㄒㄩㄣˊ'],wrongT:['ˉ','ˇ','ˋ']},
  {emoji:'🌺',name:'玫瑰',zhuyin:'ㄇㄟˊ',initial:'ㄇ',syllable:'ㄇㄟˊ',tone:'ˊ',toneWord:'ㄇㄟ',wrongI:['ㄅ','ㄆ','ㄈ','ㄉ','ㄊ'],wrongS:['ㄅㄟˊ','ㄆㄟˊ','ㄇㄠˊ','ㄇㄣˊ'],wrongT:['ˉ','ˇ','ˋ']},
  {emoji:'⭐',name:'星星',zhuyin:'ㄒㄧㄥ',initial:'ㄒ',syllable:'ㄒㄧㄥ',tone:'ˉ',toneWord:'ㄒㄧㄥ',wrongI:['ㄐ','ㄑ','ㄓ','ㄔ','ㄕ'],wrongS:['ㄐㄧㄥ','ㄑㄧㄥ','ㄒㄧㄣ','ㄒㄧㄡ'],wrongT:['ˊ','ˇ','ˋ']},
];

// Levels config
// type: initial | syllable | tone | syllable_timed
const LEVELS=[
  {id:1,name:'🥚 第一關・恐龍蛋',type:'initial',    cols:2,qCount:5,pts:10,time:0,badge:'',
    desc:'看圖，選出正確的注音首字母！\n（這是最簡單的！）'},
  {id:2,name:'🦕 第二關・小恐龍',type:'syllable',   cols:2,qCount:5,pts:15,time:0,badge:'',
    desc:'選出完整的拼音（聲母＋韻母＋聲調）！'},
  {id:3,name:'🦖 第三關・大恐龍',type:'tone',       cols:4,qCount:5,pts:20,time:0,badge:'lv2',
    desc:'只選聲調符號：ˉ ˊ ˇ ˋ\n你能聽出幾個？'},
  {id:4,name:'🌋 第四關・火山快跑！',type:'syllable_timed',cols:2,qCount:6,pts:25,time:6,badge:'lv3',
    desc:'⏰ 限時 6 秒！又快又準才能逃出火山！'},
];

let queue=[],current=null,score=0,lives=3,qNum=0,levelIdx=0;
let answering=false,timerInt=null,timerLeft=0;
let totalCorrect=0,totalQ=0;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(arr,n){return shuffle(arr).slice(0,n);}

function startGame(){
  score=0;lives=3;levelIdx=0;totalCorrect=0;totalQ=0;
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('questionArea').style.display='';
  document.getElementById('scoreNum').textContent=0;
  updateLives();startLevel();
  try{startBGM();}catch(e){}
}

function startLevel(){
  qNum=0;
  queue=shuffle(qBank).slice(0,LEVELS[levelIdx].qCount);
  updateBadge();updateProgress();nextQuestion();
}

function updateBadge(){
  const lv=LEVELS[levelIdx];
  const el=document.getElementById('levelBadge');
  el.textContent=lv.name;
  el.className='level-badge'+(lv.badge?' '+lv.badge:'');
}

function updateLives(){
  document.getElementById('livesDisplay').textContent='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
}

function updateProgress(){
  const pct=(qNum/LEVELS[levelIdx].qCount)*100;
  document.getElementById('progressBar').style.width=pct+'%';
}

function nextQuestion(){
  stopTimer();
  const lv=LEVELS[levelIdx];
  if(qNum>=lv.qCount){
    if(levelIdx<LEVELS.length-1){showLevelUp();}
    else{endGame();}
    return;
  }
  current=queue[qNum];
  answering=false;
  document.getElementById('bigEmoji').textContent=current.emoji;
  document.getElementById('itemName').textContent=current.name;
  document.getElementById('feedbackMsg').textContent='';

  const type=lv.type;
  if(type==='initial'){
    document.getElementById('questionLabel').textContent=`👀「${current.name}」的注音，首字是？`;
    document.getElementById('hintText').textContent='';
  } else if(type==='syllable'||type==='syllable_timed'){
    document.getElementById('questionLabel').textContent=`🔤「${current.name}」的完整拼音是？`;
    document.getElementById('hintText').textContent='';
  } else if(type==='tone'){
    document.getElementById('questionLabel').textContent=`🎵「${current.name}」${current.toneWord}的聲調是？`;
    document.getElementById('hintText').textContent=`ˉ 一聲　ˊ 二聲　ˇ 三聲　ˋ 四聲`;
  }

  // Build choices
  let choices=[];
  if(type==='initial') choices=shuffle([current.initial,...pick(current.wrongI,3)]);
  else if(type==='syllable'||type==='syllable_timed') choices=shuffle([current.syllable,...pick(current.wrongS,3)]);
  else if(type==='tone') choices=shuffle([current.tone,...current.wrongT]);

  const grid=document.getElementById('answersGrid');
  grid.innerHTML='';
  grid.className=`answers cols${lv.cols}`;

  const colors=['#FF7043','#42A5F5','#AB47BC','#4CAF50'];
  choices.forEach((ch,i)=>{
    const btn=document.createElement('button');
    const isSyl=type==='syllable'||type==='syllable_timed';
    const isTone=type==='tone';
    btn.className='answer-btn'+(isSyl?' small':'')+(isTone?' tone-btn':'');
    btn.style.borderColor=colors[i%4];
    btn.style.boxShadow=`0 5px 0 ${colors[i%4]}`;
    btn.innerHTML=`<span class="fi"></span>${ch}`;
    btn.onclick=()=>handleAnswer(btn,ch);
    grid.appendChild(btn);
  });

  if(lv.time>0){
    document.getElementById('timerWrap').classList.add('show');
    startTimer(lv.time);
  } else {
    document.getElementById('timerWrap').classList.remove('show');
  }
}

function getCorrect(){
  const t=LEVELS[levelIdx].type;
  if(t==='initial') return current.initial;
  if(t==='syllable'||t==='syllable_timed') return current.syllable;
  if(t==='tone') return current.tone;
}

function handleAnswer(btn,chosen){
  if(answering)return;
  answering=true;
  stopTimer();
  document.querySelectorAll('.answer-btn').forEach(b=>b.classList.add('disabled'));
  const correct=getCorrect();
  const lv=LEVELS[levelIdx];
  totalQ++;
  if(chosen===correct){
    btn.classList.add('correct');btn.querySelector('.fi').textContent='✅';
    score+=lv.pts;totalCorrect++;
    document.getElementById('scoreNum').textContent=score;
    document.getElementById('feedbackMsg').textContent=praise();
    spawnParticles(btn,['🌟','⭐','✨','🎉','🦕','🎊']);
    qNum++;updateProgress();setTimeout(nextQuestion,1100);
  } else {
    btn.classList.add('wrong');btn.querySelector('.fi').textContent='❌';
    lives--;updateLives();
    document.querySelectorAll('.answer-btn').forEach(b=>{
      if(b.textContent.includes(correct)){b.classList.add('correct');b.querySelector('.fi').textContent='✅';}
    });
    const msgs=['加油！再試試看 💪','沒關係！繼續冒險 🦕','快記起來啦！🌟','恐龍相信你！🦖'];
    document.getElementById('feedbackMsg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
    qNum++;updateProgress();
    if(lives<=0){setTimeout(endGame,1300);}else{setTimeout(nextQuestion,1400);}
  }
}

function startTimer(sec){
  timerLeft=sec;
  const bar=document.getElementById('timerBar');
  bar.style.width='100%';bar.style.background='linear-gradient(90deg,#FF5252,#FF1744)';
  timerInt=setInterval(()=>{
    timerLeft-=0.1;
    const pct=Math.max(0,(timerLeft/sec)*100);
    bar.style.width=pct+'%';
    if(pct<30)bar.style.background='linear-gradient(90deg,#FF1744,#B71C1C)';
    if(timerLeft<=0){
      stopTimer();
      if(!answering){
        answering=true;lives--;updateLives();
        document.getElementById('feedbackMsg').textContent='⏰ 時間到！火山快爆發了！';
        const correct=getCorrect();
        document.querySelectorAll('.answer-btn').forEach(b=>{
          b.classList.add('disabled');
          if(b.textContent.includes(correct)){b.classList.add('correct');b.querySelector('.fi').textContent='✅';}
        });
        qNum++;updateProgress();totalQ++;
        if(lives<=0){setTimeout(endGame,1400);}else{setTimeout(nextQuestion,1400);}
      }
    }
  },100);
}
function stopTimer(){clearInterval(timerInt);}

function showLevelUp(){
  stopTimer();
  levelIdx++;
  const lv=LEVELS[levelIdx];
  document.getElementById('popDino').textContent=levelIdx>=2?'🦖':'🦕';
  document.getElementById('popTitle').textContent=`🎉 闖關成功！進入第 ${lv.id} 關！`;
  document.getElementById('popDesc').textContent=lv.desc;
  document.getElementById('levelPopup').classList.remove('hide');
  spawnParticles({getBoundingClientRect:()=>({left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0})},['🌟','⭐','🦕','🦖','🎉']);
}
function closeLevelPopup(){
  document.getElementById('levelPopup').classList.add('hide');
  startLevel();
}

function endGame(){
  stopTimer();
  stopBGM();
  document.getElementById('timerWrap').classList.remove('show');
  document.getElementById('questionArea').style.display='none';
  document.getElementById('endScreen').classList.add('show');
  document.getElementById('finalScore').textContent=score;
  const acc=totalQ>0?Math.round((totalCorrect/totalQ)*100):0;
  const reachedLv=LEVELS[levelIdx].id;
  let stars='⭐',title='繼續加油！',dino='🦕';
  if(acc>=90&&reachedLv>=4){stars='⭐⭐⭐';title='注音小天才！恐龍最愛你！';dino='🦖';}
  else if(acc>=70||reachedLv>=3){stars='⭐⭐';title='做得很好！超棒的！';dino='🦕';}
  document.getElementById('starsRow').textContent=stars;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endDino').textContent=dino;
  document.getElementById('endStats').innerHTML=`答對 ${totalCorrect} / ${totalQ} 題&nbsp;&nbsp;正確率 ${acc}%<br>通關到第 ${reachedLv} 關`;
  setTimeout(()=>spawnParticles({getBoundingClientRect:()=>({left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0})},['🌟','⭐','🎉','🦕','🦖','🎊','✨']),250);
}

function spawnParticles(el,emojis){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<8;i++){
    const p=document.createElement('span');p.className='particle';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const angle=(i/8)*360,dist=60+Math.random()*70,rad=angle*Math.PI/180;
    p.style.left=cx+'px';p.style.top=cy+'px';
    p.style.setProperty('--dx',Math.cos(rad)*dist+'px');
    p.style.setProperty('--dy',Math.sin(rad)*dist+'px');
    document.body.appendChild(p);setTimeout(()=>p.remove(),800);
  }
}

function praise(){
  return ['超棒的！🎉','答對了！🌟','太厲害！🦕','哇！好聰明！⭐','耶！棒棒！🎊','恐龍愛你！🦖','完美！🌈'][Math.floor(Math.random()*7)];
}

// Game starts when user taps button
// ══ BGM ══
let _bgmCtx=null,_bgmPlaying=false,_bgmLoopTimer=null,_bgmStart=0;
const _MELODY=[76,0,77,76,74,0,76,0,77,0,79,77,76,0,77,0,79,81,79,77,76,74,72,0,71,72,74,76,74,72,71,0];
const _BASS=[64,0,67,0,64,0,67,0,65,0,69,0,65,0,69,0,64,0,67,0,64,0,67,0,60,0,64,0,60,0,64,0];
const _TEMPO=0.18;
function _hz(n){return 440*Math.pow(2,(n-69)/12);}
function _sched(ctx,t){
  const dur=_MELODY.length*_TEMPO;
  _MELODY.forEach((n,i)=>{
    if(!n)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=_hz(n);
    g.gain.setValueAtTime(0,t+i*_TEMPO);
    g.gain.linearRampToValueAtTime(0.15,t+i*_TEMPO+0.02);
    g.gain.linearRampToValueAtTime(0,t+i*_TEMPO+_TEMPO*0.8);
    o.connect(g);g.connect(ctx.destination);
    o.start(t+i*_TEMPO);o.stop(t+i*_TEMPO+_TEMPO);
  });
  _BASS.forEach((n,i)=>{
    if(!n)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle';o.frequency.value=_hz(n);
    g.gain.setValueAtTime(0,t+i*_TEMPO);
    g.gain.linearRampToValueAtTime(0.07,t+i*_TEMPO+0.02);
    g.gain.linearRampToValueAtTime(0,t+i*_TEMPO+_TEMPO*0.9);
    o.connect(g);g.connect(ctx.destination);
    o.start(t+i*_TEMPO);o.stop(t+i*_TEMPO+_TEMPO);
  });
  return dur;
}
function startBGM(){
  try{
  if(_bgmPlaying)return;
  _bgmPlaying=true;
  _bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
  _bgmCtx.resume().then(()=>{
    _bgmStart=_bgmCtx.currentTime+0.1;
    function loop(){
      if(!_bgmPlaying)return;
      const dur=_sched(_bgmCtx,_bgmStart);
      _bgmStart+=dur;
      _bgmLoopTimer=setTimeout(loop,(dur-0.15)*1000);
    }
    loop();
  });
  }catch(e){}
}
function beginGame(){
  document.getElementById('introScreen').style.display='none';
  startGame();
}
function stopBGM(){
  _bgmPlaying=false;
  clearTimeout(_bgmLoopTimer);
  if(_bgmCtx){try{_bgmCtx.close();}catch(e){}_bgmCtx=null;}
}

startGame();
</script>

  <button class="intro-btn" onclick="beginGame()">🎮 開始遊戲！</button>
